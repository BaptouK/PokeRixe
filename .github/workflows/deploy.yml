name: Build & Deploy Pokerixe Front

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Login ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & Push image
        run: |
          docker build -t ghcr.io/baptouk/pokerixe-front:latest .
          docker push ghcr.io/baptouk/pokerixe-front:latest

      - name: Notifier le serveur
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/private_key
          chmod 600 ~/.ssh/private_key
          ssh -i ~/.ssh/private_key -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} "docker pull ghcr.io/baptouk/pokerixe-front:latest && cd ~/pokerixe/ && docker compose up -d"
          rm -f ~/.ssh/private_key

